<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EstructuraWeb</title>
  <link rel="stylesheet" href="styleEstructuraWeb.css">
</head>
<body>
  <div class="contenidor">
    <header class="header">
      <h1>Mi pagina Web</h1>
    </header>
    <aside class="aside">
      <h2>Menu</h2>
      <ul>
        <li>Inicio</li>
        <li>Servicios</li>
        <li>Contacto</li>
      </ul>
    </aside>
    <main class="main">
      <h2>Contenido principal</h2>
      <p>Esta pagina esta creadacon CSS grid.<br>
        El contenido principal ocupa la zona mas grande
      </p>
      <section class="tarjetas">
        <!-- tarjeta 1 -->
        <div class="tarjeta">
          <img src="img/descarga (1).jpg" alt="Aholguin">
          <div class="etiqueta">Aholguin</div>
        </div>
        <!-- tarjeta 2 -->
        <div class="tarjeta">
          <img src="img/descarga.jpg" alt="Maracaibo">
          <div class="etiqueta">Maracaibo</div>
        </div>
         <!-- tarjeta 3 -->
        <div class="tarjeta">
          <img src="img/Azadi Tower.jpg" alt="Tehran">
          <div class="etiqueta">Tehran</div>
        </div>
         <!-- tarjeta 4 -->
        <div class="tarjeta">
          <img src="img/Caminito, Buenos Aires 🇦🇷.jpg" alt="Buenos Aires">
          <div class="etiqueta">Buenos Aires</div>
        </div>
         <!-- tarjeta 5 -->
        <div class="tarjeta">
          <img src="img/Home _ X.jpg" alt="Rome">
          <div class="etiqueta">Rome</div>
        </div>
         <!-- tarjeta 6 -->
        <div class="tarjeta">
          <img src="img/Städtereise mit Teenager_ Berlin Sehenswürdigkeiten für junge Leute - Familien-Reiseblog Travelsanne.jpg" alt="Berlin">
          <div class="etiqueta">Berlin</div>
        </div>
        
        
        
      </section>
    </main>
    <footer class="footer">
      <p>&copy; 2026 - Mi pagina web</p>
    </footer>
  </div>
  
</body>
</html>
