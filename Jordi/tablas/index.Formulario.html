<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario Matricula</title>
  <link rel="stylesheet" href="formulario.css">
</head>
<body>
  <div class="formulari">
    <table>
      <colgroup>
        <col class="c1">
        <col class="c2">
        <col class="c3">
      </colgroup>
      <tr>
        <th class="titol" colspan="3">Full de matricula</th>
      </tr>
      <tr>
        <td class="seccio" colspan="3">Dates personales</td>
      </tr>
      <tr>
        <td class="camp" colspan="3">Nom</td>
      </tr>
      <tr>
        <td class="camp" colspan="3">Cognoms</td>
      </tr>
      <tr>
        <td class="camp" colspan="3">Adreça</td>
      </tr>
      <tr>
        <td class="camp">Codi postal</td>
        <td class="camp" colspan="2">Poblacio</td>
      </tr>
      <tr>
        <td class="camp">Telefon</td>
        <td class="camp" colspan="2">E-mail</td>
      </tr>
      <tr>
        <td class="camp">Data Naixament</td>
        <td class="camp">SS</td>
        <td class="camp">NIE/DNI</td>
      </tr>
      <tr>
        <td class="seccio" colspan="3">Dates de l'empresa</td>
      </tr>
      <tr>
        <td class="camp" colspan="2">Empresa</td>
        <td class="camp">
          <span class="check"></span> Autonom
        </td>
      </tr>
      <tr>
        <td class="camp" colspan="3">Adreça</td>
      </tr>

    </table>
  </div>


</body>
</html>
