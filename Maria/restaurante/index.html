<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Banner animado</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <main class="restaurant">
    <nav class="nombre">
      <button class="vampiro" id="btnVampiro">I eat blood</button>
      <h1>Rh21</h1>
      <button class="angel" id="btnAngel">I eat souls</button>
    </nav>

    <section class="creatures">
      <div class="vampiros" id="vampiros">
        <div class="bebidas" id="bebidas">
          <H2>Vampires Drinks</H2>
          <h3 class="nombreBebida" id="nombreBebida"></h3>
          <p class="ingrediente" id="ingrediente"></p>
          <label for="menu">Blood type:</label>

          <select id="tipoDeSangre" name="tipoDeSangre">
            <option value="">-- Choose blood type --</option>
            <option value="AB-">AB</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
          </select>
        </div>
      </div>


      <div class="angels" id="angels">
        <H2>Angeles menu</H2>
        <h3>Drinks</h3>
        <h3>Food</h3>
      </div>
    </section>
  </main>



  <!-- <label for="nombre">Nombre:</label>
  <input type="text" id="nombre" placeholder="Tu nombre aquí">
  <button id="btnEntrar">Entrar</button> -->

  <script src="restaurante.js"></script>
</body>

</html>
