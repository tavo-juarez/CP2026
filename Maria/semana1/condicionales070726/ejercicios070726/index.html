<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <div class="disco">
      <h2>Disco</h2>
      <label for="edadDisco" class="form-label">Que edad tienes?</label>
      <input type="number" class="form-control" id="edadDisco">
      <button type="submit" class="btn btn-primary" onclick="comprobarEdad()">Comprobar</button>
      <p id="disco"></p>
    </div>


    <!-- ----------------------------------------------------------------- -->


    <div class="concierto">
      <h2>Concierto</h2>

     
        <input class="form-check-input" type="radio" name="entrada" id="entradasi" checked value="si">
        <label class="form-check-label" for="entradaSi">
          Si
        </label>
      
        <input class="form-check-input" type="radio" name="entrada" id="entradaNo"  value="no">
        <label class="form-check-label" for="entradaNo">
          No
        </label>
      

      <label for="edadConcierto" class="form-label">Que edad tienes?</label>
      <input type="text" class="form-control" id="edadConcierto">
    </div>
    <button type="submit" class="btn btn-primary" onclick="comprobarDatos()">Comprobar</button>

    <!-- ------------------------------------------------------------------- -->


    <div class="idiomas">
      <h2>Idiomas</h2>
      <button type="button" class="btn btn-warning" onclick="escribir('esp')">Español</button>
      <button type="button" class="btn btn-warning" onclick="escribir('eng')>Ingles</button>
      <button type="button" class="btn btn-warning" onclick="escribir('Fr')>Fraces</button>
      <button type="button" class="btn btn-warning" onclick="escribir('al')>Aleman</button>
      <p id="idioma"></p>
    </div>


    // <!-- ----------------------------------------------------------------- -->


    <div class="entradas">
      <h2>Entradas</h2>
      <label for="edadDisco" class="form-label">Que edad tienes?</label>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="ejercicio.js"></script>
</body>

</html>
