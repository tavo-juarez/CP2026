<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <link rel="stylesheet" href="styles.css">
  <title>Contraseña memorable</title>
</head>

<body>
  <main>
    <!-----------------Seccion acceso ------------------------- -->

    <section id="acceso">
      <h1>Pasaporte de tapas del Raval</h1>
      <p>Vsita los 19 bares de la ruta y completa tu pasaporte</p>
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" placeholder="Tu nombre aqui">
      <button id="btnEntrar">Entrar</button>
      <p id="mensajeAcceso"></p>
    </section>

    <!-- -----------------Seccion Pasaporte-------------------- -->

    <section id="pasaporte">
      <header>
        <h2 id="saludo"></h2>
        <p id="progreso"></p>
        <div class="barra">
          <div class="barraProgreso"></div>
        </div>
        <p id="estadoPasaporte"></p>
      </header>

      <!--------------------- Seccion lista bares------------------>

      <section id="listaBares">

      </section>
      <p id="mensajeSello"></p>
    </section>

  </main>


  <script src="pasaporteBares.js"></script>
</body>

</html>
