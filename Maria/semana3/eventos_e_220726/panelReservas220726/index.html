<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de reservas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>


  <main>
    <h1>Panel de reservas</h1>
    <section id="actividad">
      <p>Actividad destacada</p>
      <h2>Taller de ceramica</h2>
      <p>Increible actividad de diseño de pieza de ceramica</p>
      <p>Plazas disponibles: <span id="numeroPlazas">5</span></p>
      <button id="btnReserva">Disponible</button>
      <p id="mensajeReserva"></p>
    </section>

    <section>
      <h2>Datos de la reserva</h2>
      <form id="formularioReserva">
        <div>
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Tu nombre">
          <small id="mensajeNombre"></small>
        </div>

        <div>
          <label for="turno">Turno</label>
          <select name="" id="turno">
          <option value="">Elige tu turno</option>
          <option value="mañana">Mañana</option>
          <option value="tarde">Tarde</option> 
          </select>
        </div>

        <div>
          <label for="comentario"></label>
          <textarea id="comentario" maxlength="100" placeholder="Comentarios aqui"></textarea>
          <small id="contadorCaracteres">0</small>
        </div>

        <button type="submit">Confirmar datos</button>
      </form>

      <p id="resultadoFormulario"></p>
    </section>

    <section>
      <h2>participantes</h2>
      <div id="listaParticipantes">
        <p class="aviso">Todavia no hay</p>
      </div>
    </section>
  </main>

  
<!-- La propiedad "defer" hace que los script no carguen hasta que 
 todo el HTML este cargado -->
  <script src="script.js" defer></script>
</body>
</html>
