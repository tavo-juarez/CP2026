<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex direction</title>
  <style>
    /* con esta propiedad CSS le decimos que el borde 
    lo haga para dentro lineas 10-14*/
    *, 
    ::after,
    ::before{
        box-sizing: border-box;
    }
    .container{
      background-color: #333;
      padding: 10px;
      margin-bottom: 10px;
      display: flex;
      /* flex-direction: row;
      flex-wrap: wrap; 
      linea 23 hace short hand de lo que antes hacian lineas 20 y 21 
      flex-flow: row wrap;

      flex-direction: row-reverse;
      flex-direction: colum;
      flex-direction: colum-reverse; 
      flex-wrap: wrap;
      */
      flex-wrap: wrap-reverse;
      flex-direction: row-reverse;

    }
    .item{
      background-color: tomato;
      border: 1px #fff solid;
      width: 50%;
    }
  </style>
</head>
<body>
  <!-- section.container>article*3.item{flex item$} short hand para lineas 10-14  -->
   <section class="container">
    <article class="item">flex item 1</article>
    <article class="item">flex item 2</article>
    <article class="item">flex item 3</article>
    <article class="item">flex item 4</article>
   </section>
   <section class="container">
    <article class="item">flex item A</article>
    <article class="item">flex item B</article>
    <article class="item">flex item C</article>
   </section>

</body>
</html>
