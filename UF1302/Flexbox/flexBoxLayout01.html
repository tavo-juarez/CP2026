<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout con CSS y Flexbox</title>
  <style>
    *{
      /* linea 11 hace que todos los bordes vayan detro del div */
      box-sizing: border-box;
    }
    body{
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
    }
    #main{
      display: flex;
      flex: 1;
    }
    #main > article{
      flex: 1;
      order: 1;
    }
    #main > aside, #main > nav{
      flex: 0 0 20vw;
    }
    #main > nav{
      background-color: #d7e8d4;
      order: 3;
    }
    #main > aside{
      background-color: beige;
      order: 2;
    }
    header, footer{
      background-color: yellowgreen;
      height: 20vh;
    }
    header, footer, article, nav, aside{
      padding: 1em;
    }
  </style>
</head>

<body>
  <header>Header</header>
  <div id="main">
    <article>Article</article>
    <aside>Aside</aside>
    <nav>Nav</nav>
  </div>
  <footer>Footer</footer>
</body>

</html>
