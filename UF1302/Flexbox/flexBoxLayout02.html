<!DOCTYPE html>
<html lang="es-ES">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout con CSS y Flexbox</title>
  <style>
    *{
      box-sizing: border-box;
    }
    body{
      display: flex;
      min-height: 100vh;
      margin: 0;
    }
    .col-1{
      background-color: #d7e8d4;
      flex: 1;
    }
    .col-2{
      display: flex;
      flex-direction: column;
      flex: 5;
    }
    main{
      display: flex;
      min-height: 60vh;
    }
    main > aside{
      background-color: beige;
      flex: 1;
    }
    main> article{
      flex: 3;
    } 
    header, footer{
      background-color: yellowgreen;
      height: 20vh;
    }
    header, footer, article, nav, aside{
      padding: 1em;
    }
  </style>
</head>
<body>
  <!-- nav.col-1{Nav} short hand linea 10 -->
    <nav class="col-1">Nav</nav>
    <div class="col-2">
      <header>Header</header>
      <main>
        <article>Aricle</article>
        <aside>Aside</aside>
      </main>
      <footer>Footer</footer>
    </div> 
</body>
</html>
