<!DOCTYPE html>
<html lang="es-ES">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout con CSS y Flexbox</title>
  <style>
    *{
      box-sizing: border-box;
    }
    body{
      margin: 0;
    }
    main{
      display: flex;
      min-height: calc(100vh - 40vh);
    }
    main > nav, main > aside{
      flex: 0 0 20vw;
      background-color: beige;
    }
    main > nav{
      order: -1;
    }
    main > article{
      flex: 1;
    }
    header, footer{
      background-color: yellowgreen;
      height: 20vh;
    }
    header, footer, article, nav, aside{
      padding: 1em;
    }

  </style>
</head>
<body>
  <header>Header</header>
  <main>
    <article>Article</article>
    <nav>Nav</nav>
    <aside>Aside</aside>
  </main>
  <footer>Footer</footer>
</body>
</html>
