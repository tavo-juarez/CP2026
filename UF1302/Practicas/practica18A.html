    <hr>
    <pre>
        &sum;<sub>n</sub> = X<sub>n</sub> + X<sub>n</sub>-2
    </pre>
    <code>
      <hr>
      <!-- El texto en pre se escribe igual que se escribe y se muestra en HTML -->
     <pre>
        if(n>=5){
          apto = "Si";
        }
        else(n>=5){
          <del>apto = "No";</del>
        }
     </pre>
    </code>
  <!-- sub para poner elementos por debajo / sup para poner elementos por encima -->
