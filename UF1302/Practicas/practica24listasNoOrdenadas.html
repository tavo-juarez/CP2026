<!DOCTYPE html>
<html lang="es-ES">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listas no ordenadas</title>
  <link rel="stylesheet" href="CSS/practica24listasNoOrdenada.css">
</head>

<body>
  <h1>Lista no ordenada (unorderedList)</h1>
  <ul>
    <li class="circulo">Cafe</li>
    <li class="cuadrado">Te</li>
    <li class="disco">Cola</li>
  </ul>
  <!-- ul>li*3 short hand -->
  <!-- ul.circulo>li{cafe}+li{te}+{cola} short hand para concatenar -->
  <!-- ul.circulo>li{item$}*3 asi cuenta -->
</body>
