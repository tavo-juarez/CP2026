<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listas ordenadas (ordered list)</title>
</head>

<body>
  <!-- lineas 10-14 se hicieron ul.circulo>li{tren}+li{Bus}+{coche} -->
  <ol>
    <li>tren</li>
    <li>Bus</li>
    <li>coche</li>
  </ol>
  <ol reversed>
    <li>tren</li>
    <li>Bus</li>
    <li>coche</li>
  </ol>
</body>

</html>
