<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listas ordenadas (ordered list)</title>
  <link rel="stylesheet" href="CSS/practica26listasOrdenadas.css">
</head>

<body>
  <!-- lineas 10-14 se hicieron ul.circulo>li{tren}+li{Bus}+{coche} -->
  <ol>
    <li>tren</li>
    <li>Bus</li>
    <li>coche</li>
  </ol>
  <ol reversed>
    <li>tren</li>
    <li>Bus</li>
    <li>coche</li>
  </ol>
  <ol class="estilo-lista">
    <li>Tren</li>
    <li>Coche</li>
    <li>Avion</li>
    <li>Moto</li>
    <li>Bicicleta</li>
  </ol>
</body>

</html>
