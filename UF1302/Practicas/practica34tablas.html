<!DOCTYPE html>
<html lang="es-ES">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablas</title>
</head>

<body>

  <table>
    <caption>
      Gastos de la empresa por mes
    </caption>
    <thead>
      <tr>
        <th>Mes</th>
        <th>Hardware</th>
        <th>Software</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Enero</td>
        <td>2.500EUR</td>
        <td>200EUR</td>
      </tr>
      <tr>
        <td>Febreno</td>
        <td>4.000EUR</td>
        <td>600EUR</td>
      </tr>
    </tbody>
  </table>

</body>

</html>
