<!DOCTYPE html>
<html lang="es-ES">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablas y Celdas</title>
  <link rel="stylesheet" href="CSS/practica35.tablasCeldas.css">
</head>

<body>

  <table>
    <caption>
      Gastos de la empresa por mes
    </caption>
    <thead>
      <tr>
        <th>Celda 1</th>
        <th>Celda 2</th>
        <th>Celda 3</th>
        <th>Celda 4</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td rowspan="2">Celda 5</td>
        <td>celda 6</td>
        <td colspan="2">Celda 7</td>
   <!-- <td>Celda 8</td> hemos usado colspan para unir linea 29 con 30 -->
      </tr>
      <tr>
   <!-- <td>Celda 9</td> hemos usado rowspan para unir linea 27 con 33 -->
        <td>Celda 10</td>
        <td>Celda 11</td>
        <td>Celda 12</td>
      </tr>
    </tbody>
  </table>

</body>

</html>
