<!DOCTYPE html>
<html lang="es-ES">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablas con CSS</title>
  <link rel="stylesheet" href="CSS/practica36tablasConCSS.css">
</head>
<body>
  <table class="caja">
    <caption>Tabla de ejemplo</caption>
    <thead>
      <tr>
        <th>Cabecera 1</th>
        <th>Cabecera 2</th>
        <th>Cabecera 3</th>
        <th>Cabecera 4</th>
      </tr>
    </thead>
    <!-- tfoot>tr>td*4{pie$} sort hand para linea entre 19-26 -->
    <tfoot>
      <tr>
        <td>pie1</td>
        <td>pie2</td>
        <td>pie3</td>
        <td>pie4</td>
      </tr>
    </tfoot>
    <!-- tbody>tr*5>td{datos$}*4 short hand para lineas 
     entre 29-60 -->
     <tbody>
      <tr>
        <td></td>
        <td>datos2</td>
        <td>datos3</td>
        <td>datos4</td>
      </tr>
      <tr>
        <td>datos1</td>
        <td>datos2</td>
        <td>datos3</td>
        <td>datos4</td>
      </tr>
      <tr>
        <td>datos1</td>
        <td>datos2</td>
        <td>datos3</td>
        <td>datos4</td>
      </tr>
      <tr>
        <td>datos1</td>
        <td>datos2</td>
        <td>datos3</td>
        <td>datos4</td>
      </tr>
      <tr>
        <td>datos1</td>
        <td>datos2</td>
        <td>datos3</td>
        <td>datos4</td>
      </tr>
     </tbody>
  </table>
</body>
</html>
