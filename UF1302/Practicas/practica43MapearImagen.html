<!DOCTYPE html>
<html lang="es-ES">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapear imagen</title>
</head>

<body>
  <div>
    <img src="Imagenes/mapeadoIMG.jpg" alt="mapa de imagen" width="380" height="72" usemap="#Buscadores">
    <map name="Buscadores">
      <area title="Google" shape="circle" coords=" 51,37,26" href="https://www.google.com/?hl=es&zx=1776264139122"
        alt="Pulsa aqui para usar el buscador de Google" target="_blank">
      <area title="Bing" shape="circle" coords="143,37,26" href="https://www.bing.com/?setlang=es"
        alt="Pulsa aqui para ir al buscador de bing" target="_blank">
      <area title="Ecosia" shape="circle" coords="234,37,26" href="https://www.ecosia.org/?c=es"
        alt="Pulsa aqui para ir al buscador de ecosia" target="_blank">
      <area title="Yahoo" shape="circle" coords="326,37,26" href="https://es.search.yahoo.com/?fr2=p:fprd,mkt:es"
        alt="Pulsa aqui para ir al buscador de Yahoo" target="_blank">
    </map>
  </div>
  <div>
    <img src="Imagenes/mapeadoIMG.jpg" alt="mapa de imagen" width="380" height="72" usemap="#Rectangulo">
    <map name="Rectangulo">
      <area title="Politecnic" shape="rect" coords="0,0,380,72" href="https://politecnics.barcelona/" alt="Politecnics"
        target="_blank">
    </map>
  </div>

</body>

</html>
