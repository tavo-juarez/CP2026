<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marquesinas</title>
</head>

<body>
  <marquee behavior="scroll" direction="left">
    <h1>
      Este texto va de deracha a izquierda
    </h1>
  </marquee>
  <marquee behavior="scroll" direction="up">
    <h2>
      Este texto va de abajo a arriba
    </h2>
  </marquee>
  <marquee behavior="alternate" direction="down" width="250" height="200" style="border: 1px solid tomato">
    Este texto rebota
  </marquee>
</body>

</html>
