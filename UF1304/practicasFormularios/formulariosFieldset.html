<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario con fieldset</title>
</head>

<body>
  <!-- Siempre que se hacen formalarios todo de be ir dentro d ela etiqeta "form" -->
  <form action="#">
    <fieldset>
  <!-- la etiqueta "legend" esta sujeta a la etiqueta "fieldset" -->
      <legend>Datos personales</legend>

      <label for="name">Name:</label><br>
      <input type="text" size="45" id="name"><br>

      <label for="lastname">lastname:</label><br>
      <input type="text" size="45" id="lastname"><br>

      <label for="email">Write your email:</label><br>
      <input type="email" size="45" id="email"><br>

      <label for="question">Write your question here</label><br>
      <textarea id="question" cols="45" rows="5"></textarea>
    </fieldset>


  </form>

</body>

</html>
