<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Registro</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <h1>Formulario de Registro</h1>

  <form action="#" method="post">

    <fieldset>
      <legend>Información Personal</legend>

      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" name="nombre" required>

      <label for="apellido">Apellido:</label>
      <input type="text" id="apellido" name="apellido" required>

      <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
      <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>

      <fieldset class="genero">
        <legend>Género:</legend>
        <input type="radio" id="genero_masculino" name="genero" value="masculino" required>
        <label for="genero_masculino" class="radio-label">Masculino</label>

        <input type="radio" id="genero_femenino" name="genero" value="femenino" required>
        <label for="genero_femenino" class="radio-label">Femenino</label>

        <input type="radio" id="genero_otro" name="genero" value="otro" required>
        <label for="genero_otro" class="radio-label">Otro</label>
      </fieldset>
    </fieldset>

    <fieldset>
      <legend>Información de Contacto</legend>

      <label for="email">Dirección de Correo Electrónico:</label>
      <input type="email" id="email" name="email" required>

      <label for="telefono">Número de Teléfono:</label>
      <input type="tel" id="telefono" name="telefono" required>

      <label for="direccion">Dirección:</label>
      <textarea id="direccion" name="direccion" rows="4"></textarea>
    </fieldset>

    <fieldset>
      <legend>Información de Cuenta</legend>

      <label for="usuario">Nombre de Usuario:</label>
      <input type="text" id="usuario" name="usuario" required>

      <label for="contrasena">Contraseña:</label>
      <input type="password" id="contrasena" name="contrasena" required>

      <label for="confirmar_contrasena">Confirmación de Contraseña:</label>
      <input type="password" id="confirmar_contrasena" name="confirmar_contrasena" required>
    </fieldset>

    <fieldset>
      <legend>Preferencias</legend>

      <label for="color_favorito">Color Favorito:</label>
      <select id="color_favorito" name="color_favorito">
        <option value="rojo">Rojo</option>
        <option value="azul">Azul</option>
        <option value="verde">Verde</option>
        <option value="amarillo">Amarillo</option>
      </select>

      <div class="checkbox-group">
        <input type="checkbox" id="terminos" name="terminos" required>
        <label for="terminos" class="radio-label">Acepto los Términos y Condiciones</label>
      </div>
    </fieldset>

    <button type="submit">Registrarse</button>

  </form>

</body>
</html>
