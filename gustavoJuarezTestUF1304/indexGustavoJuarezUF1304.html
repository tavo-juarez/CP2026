<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario de Registro</title>
</head>
<body>

  <h1>Formulario de Registro</h1>
  <form action="#" method="post">

    <fieldset>
      <legend>Información Personal</legend>

      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" name="nombre" required><br><br>

      <label for="apellido">Apellido:</label>
      <input type="text" id="apellido" name="apellido" required><br><br>

      <label for="fecha-nacimiento">Fecha de Nacimiento:</label>
      <input type="date" id="fecha-nacimiento" name="fecha-nacimiento" required><br><br>

      <p>Género:</p>
      <input type="radio" id="masculino" name="genero" value="masculino" required>
      <label for="masculino">Masculino</label>

      <input type="radio" id="femenino" name="genero" value="femenino" required>
      <label for="femenino">Femenino</label>

      <input type="radio" id="otro" name="genero" value="otro" required>
      <label for="otro">Otro</label>
    </fieldset>

    <fieldset>
      <legend>Información de Contacto</legend>

      <label for="email">Correo Electrónico:</label>
      <input type="email" id="email" name="email" required><br><br>

      <label for="telefono">Número de Teléfono:</label>
      <input type="tel" id="telefono" name="telefono" required><br><br>

      <label for="direccion">Dirección:</label><br>
      <textarea id="direccion" name="direccion" rows="4" cols="30"></textarea>
    </fieldset>

    <fieldset>
      <legend>Información de Cuenta</legend>

      <label for="usuario">Nombre de Usuario:</label>
      <input type="text" id="usuario" name="usuario" required><br><br>

      <label for="password">Contraseña:</label>
      <input type="password" id="password" name="password" required><br><br>

      <label for="confirmar-password">Confirmación de Contraseña:</label>
      <input type="password" id="confirmar-password" name="confirmar-password" required>
    </fieldset>

    <fieldset>
      <legend>Preferencias</legend>

      <label for="color-favorito">Color Favorito:</label>
      <select id="color-favorito" name="color-favorito">
        <option value="rojo">Rojo</option>
        <option value="azul">Azul</option>
        <option value="verde">Verde</option>
        <option value="amarillo">Amarillo</option>
      </select><br><br>

      <input type="checkbox" id="terminos" name="terminos" required>
      <label for="terminos">Acepto los Términos y Condiciones</label>
    </fieldset>

    <br>
    <button type="submit">Registrarse</button>

  </form>

</body>
</html>
