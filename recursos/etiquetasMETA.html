<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aqui va el titulo de la pagina</title>
  <!-- las dimenciones del icono de favoritos para desktop es de 64x64px  -->
  <link rel="shortcut icon" href="https://politecnics.barcelona/wp-content/uploads/favicon-politecnics.png"
    type="image/x-icon">
  <!-- las dimenciones del favicon de Apple es de 192x192px -->
  <link rel="apple-touch-icon" href="https://politecnics.barcelona/wp-content/uploads/favicon-politecnics.png"
    sizes="192x192px">
  <!-- las dimenciones del favicon de Android es de 192x192px -->
  <link rel="icon" href="https://politecnics.barcelona/wp-content/uploads/favicon-politecnics.png">
  <!-- las dimenciones del favicon de MicroSoft son de 270x270px -->
  <meta name="msapplication-TileImage"
    content="https://politecnics.barcelona/wp-content/uploads/favicon-politecnics.png">
  <!-- Esta etiqueta meta sirve para que los robots nos tengan en cuenta respecto a la indexacion -->
  <meta name="robots" content="index, follow">
  <!-- esta etiqueta sirve para ayudar al posicionamiento cuando google "lee" tu pagina web -->
  <meta name="description" content="Descripcion del site con una longitud max de 140 caracteres">
  <link rel="canonical" href="aqui pones tu dominio/enlace">


  
  <!-- inicializamos la etiqueta de la imagen que se ve cuando compartimos el enlace por redes como por ejemplo Whatsapp> -->
  <meta property="og:locale" content="es_ES">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Titulo del website no mayor a 90 caracteres">
  <meta property="og:description" content="Descripcion del site con una longitud max de 140 caracteres">
  <meta property="og:url" content="aqui pones tu dominio/enlace">
  <meta property="og:site_name" content="Nombre del sitio">
  <!-- Esta linea sireve para indicarle si tienes pagina/perfil de FaceBook, sino el contenido queda vacio-->
  <meta property="article:publisher" content="enlace a tu perfil de facebook, o sino tienes se queda vacio">
  <meta property="og:image" content="url de la imagen destacada, si no hay se pone logo de empresa">
  <meta property="og:image:width" content="400 o cualquier otro tamaño">
  <meta property="og:image:height" content="200">
  <meta property="og:image:type" content="image/jpg">
  <!-- Opcionalmente podemos incluir las etiquetas Open Graph de "X" -->
  <meta name="twitter:card" content="Titulo del website no mayor a 90 caracteres">
  <meta name="twitter:description" content="Descripcion del site con una longitud max de 140 caracteres">
  <meta name="twitter:image" content="url de la imagen destacada, si no hay se pone logo de empresa">


</head>

<body>

</body>

</html>
