<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista centrada</title>
  <style>
    ul {
      display: inline-block;
      text-align: left;
    }

    #caja-centrada {
      text-align: center;
      width: 50%;
      border: 1px solid black;
      margin: 20px auto;
    }
  </style>
</head>

<body>
  <div id="caja-centrada">
    <ul>
      <li>Uno</li>
      <li>Dos</li>
      <li>Tres</li>
      <li>Cuatro</li>
    </ul>
  </div>
</body>

</html>
